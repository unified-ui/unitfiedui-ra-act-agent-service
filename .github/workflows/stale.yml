name: "Stale Issues"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had any activity for 60 days.
            It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please comment or remove the stale label.
          stale-issue-label: "stale"
          days-before-issue-stale: 60
          days-before-issue-close: 14
          exempt-issue-labels: "pinned,security,bug,enhancement"

          # PRs
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had any activity for 30 days.
            It will be closed in 7 days if no further activity occurs.
            Please update your PR or comment if it should remain open.
          stale-pr-label: "stale"
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-pr-labels: "pinned,security,work-in-progress"
