name: CI — PR Branch Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  branch-naming:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|hotfix)/"

          # Allow special branches without prefix
          if [[ "$BRANCH" == "develop" || "$BRANCH" == "main" ]]; then
            echo "✅ Branch '$BRANCH' is a protected branch — allowed."
            exit 0
          fi

          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH' does not follow convention."
            echo ""
            echo "   Expected: <type>/<description>"
            echo ""
            echo "   Types:"
            echo "     feat/     - New feature"
            echo "     fix/      - Bug fix"
            echo "     hotfix/   - Urgent production fix (direct to main)"
            echo "     docs/     - Documentation only"
            echo "     refactor/ - Code refactoring"
            echo "     test/     - Adding tests"
            echo "     ci/       - CI/CD changes"
            echo "     chore/    - Maintenance tasks"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."

  branch-target:
    name: Validate PR Target
    runs-on: ubuntu-latest
    steps:
      - name: Check PR target branch rules
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          echo "📋 PR: $SOURCE → $TARGET"
          echo ""

          # Rules for PRs to main
          if [[ "$TARGET" == "main" ]]; then
            # Allowed: develop, hotfix/*
            if [[ "$SOURCE" == "develop" || "$SOURCE" =~ ^hotfix/ ]]; then
              echo "✅ PR to 'main' from '$SOURCE' is allowed."
              exit 0
            else
              echo "❌ PRs to 'main' are only allowed from:"
              echo "   • develop (regular releases)"
              echo "   • hotfix/* (emergency fixes)"
              echo ""
              echo "   Your branch: $SOURCE"
              echo ""
              echo "   📖 Simplified Flow:"
              echo "   ┌────────────────────────────────────────────────────────────┐"
              echo "   │                                                            │"
              echo "   │  feat/* ──┐                                                │"
              echo "   │  fix/*  ──┼──▶ develop ──────────────▶ main (release)     │"
              echo "   │  docs/* ──┤        ▲                    │                  │"
              echo "   │  ci/*   ──┘        │                    ▼                  │"
              echo "   │                    └──── hotfix/* ─────▶│                  │"
              echo "   │                                                            │"
              echo "   └────────────────────────────────────────────────────────────┘"
              exit 1
            fi
          fi

          # Rules for PRs to develop
          if [[ "$TARGET" == "develop" ]]; then
            # Allowed: feat/*, fix/*, docs/*, refactor/*, test/*, ci/*, chore/*, style/*, perf/*, build/*, revert/*
            if [[ "$SOURCE" =~ ^(feat|fix|docs|refactor|test|ci|chore|style|perf|build|revert)/ ]]; then
              echo "✅ PR to 'develop' from '$SOURCE' is allowed."
              exit 0
            # Also allow merging back from hotfix/* (backports)
            elif [[ "$SOURCE" =~ ^hotfix/ ]]; then
              echo "✅ PR to 'develop' from '$SOURCE' (backport) is allowed."
              exit 0
            else
              echo "❌ PRs to 'develop' are only allowed from:"
              echo "   • feat/*     - New features"
              echo "   • fix/*      - Bug fixes"
              echo "   • docs/*     - Documentation"
              echo "   • refactor/* - Code restructuring"
              echo "   • test/*     - Test additions"
              echo "   • ci/*       - CI/CD changes"
              echo "   • chore/*    - Maintenance"
              echo "   • hotfix/*   - Backports from hotfixes"
              echo ""
              echo "   Your branch: $SOURCE"
              exit 1
            fi
          fi

          # Default: allow other targets (feature branches, etc.)
          echo "✅ PR to '$TARGET' is allowed."
