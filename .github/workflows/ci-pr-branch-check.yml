name: CI — PR Branch Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  branch-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|hotfix)/ ]]; then
            echo "❌ Branch name '$BRANCH' does not follow convention: <type>/<description>"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid"

  branch-target:
    runs-on: ubuntu-latest
    steps:
      - name: Validate target branch
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          if [[ "$BASE" == "main" && ! "$HEAD" =~ ^(develop|hotfix/) ]]; then
            echo "❌ Only 'develop' or 'hotfix/*' branches can target 'main'"
            exit 1
          fi
          echo "✅ Target branch is valid"
