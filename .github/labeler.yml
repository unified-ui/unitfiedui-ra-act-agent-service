# Labels PRs based on files changed

# API changes
api:
  - changed-files:
    - any-glob-to-any-file: 'app/api/**/*'

# Services
services:
  - changed-files:
    - any-glob-to-any-file: 'app/services/**/*'

# Models
models:
  - changed-files:
    - any-glob-to-any-file: 'app/models/**/*'

# Core changes
core:
  - changed-files:
    - any-glob-to-any-file: 'app/core/**/*'

# Middleware
middleware:
  - changed-files:
    - any-glob-to-any-file: 'app/middleware/**/*'

# Tests
tests:
  - changed-files:
    - any-glob-to-any-file: 'tests/**/*'

# Documentation
documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'

# CI/CD
ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**/*'

# Docker
docker:
  - changed-files:
    - any-glob-to-any-file: 'docker/**/*'
    - any-glob-to-any-file: '**/Dockerfile*'
    - any-glob-to-any-file: '**/.dockerignore'

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file: 'pyproject.toml'
    - any-glob-to-any-file: 'uv.lock'
